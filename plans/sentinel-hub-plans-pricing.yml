specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Sentinel Hub
providerId: sentinel-hub
created: '2026-06-13'
modified: '2026-06-13'
reconciled: true
tags:
  - Satellite Imagery
  - Geospatial
  - Processing Units
  - Plans
description: >-
  Sentinel Hub pricing is based on Processing Units (PUs). One PU equals a request for a
  512x512 pixel output image using 3 input bands in 8/16-bit format. Subscriptions grant a
  monthly allocation of PUs and HTTP requests that do not roll over. Batch Processing API
  costs 1/3 of equivalent Process API PUs; Async Processing API costs 2/3 for areas >=10,000
  pixels. Pricing is managed through Planet (which acquired Sinergise) and requires contacting
  sales for current tier details.
notes: >-
  Sentinel Hub was acquired by Planet in 2022. Pricing tiers are now managed under the Planet
  Insights Platform. Contact sales@planet.com or check planet.com/pricing for current
  subscription packages. CREODIAS and Copernicus Data Space Ecosystem offer additional access
  routes with their own pricing.
sources:
  - https://www.sentinel-hub.com/pricing/
  - https://docs.sentinel-hub.com/api/latest/api/overview/billing/
  - https://documentation.dataspace.copernicus.eu/APIs/SentinelHub/Overview/ProcessingUnit.html
  - https://docs.planet.com/platform/processing-units/
plans:
  - id: sentinel-hub-trial
    name: Trial / Free Tier
    type: free
    description: >-
      Free evaluation access for registered users. Provides a limited monthly allocation of
      Processing Units and requests for testing the Process, Catalog, Statistical, and OGC APIs.
    entries:
      - label: Processing Units (Trial)
        name: processing_units_trial
        type: free
        metric: processing-units
        limit: 10
        timeFrame: minute
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: HTTP Requests (Trial)
        name: requests_trial
        type: free
        metric: requests
        limit: 10
        timeFrame: minute
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Process API access
      - name: Catalog API access
      - name: Statistical API access
      - name: OGC WMS/WCS/WMTS/WFS access
  - id: sentinel-hub-subscription
    name: Subscription (PU-based)
    type: usage
    description: >-
      Monthly or annual subscription granting a fixed allocation of Processing Units and
      HTTP requests per minute and per month. Tier size determines PU/minute and PU/month
      caps. Contact Planet sales for exact package pricing. Unused PUs do not roll over.
    entries:
      - label: Processing Units per Month
        name: processing_units_monthly
        type: quota
        metric: processing-units
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see https://www.planet.com/pricing/
        userMultiplied: false
      - label: Batch Processing API (PU discount)
        name: batch_pu_discount
        type: usage
        metric: processing-units
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.33x standard PU cost for tiles >10,000 px'
        userMultiplied: false
      - label: Async Processing API (PU discount)
        name: async_pu_discount
        type: usage
        metric: processing-units
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.67x standard PU cost for areas >=10,000 px'
        userMultiplied: false
      - label: Cross-region data delivery
        name: cross_region_delivery
        type: usage
        metric: megabytes
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.03 PU per MB'
        userMultiplied: false
    elements:
      - name: Process API
      - name: Catalog API
      - name: Statistical API
      - name: Batch Processing API
      - name: Async Processing API (Beta)
      - name: OGC Services (WMS, WCS, WFS, WMTS)
      - name: BYOC (Bring Your Own COG)
      - name: Third Party Data Import (TPDI)
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
